<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" width="100%" preserveAspectRatio="xMidYMid meet">
  <!-- ============ DEFINIÇÕES ============ -->
  <defs>
    <!-- Céu -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5fa8c9"/>
      <stop offset="60%" stop-color="#9fcde0"/>
      <stop offset="100%" stop-color="#c8e4ee"/>
    </linearGradient>

    <!-- Água da superfície (transição pro azul do próximo SVG) -->
    <linearGradient id="surfaceWater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e9bbf"/>
      <stop offset="100%" stop-color="#0d3b66"/>
    </linearGradient>

    <!-- Brilho do sol -->
    <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff4a3" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#ffd700" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffa500" stop-opacity="0"/>
    </radialGradient>

    <!-- Nuvem -->
    <linearGradient id="cloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dde6ec"/>
    </linearGradient>

    <!-- Vela -->
    <linearGradient id="sail" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8d8c0"/>
    </linearGradient>
  </defs>

  <!-- ============ CÉU ============ -->
  <rect width="900" height="210" fill="url(#sky)"/>

  <!-- Brilho do sol -->
  <circle cx="750" cy="80" r="140" fill="url(#sunGlow)">
    <animate attributeName="r" values="140;155;140" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Sol -->
  <circle cx="750" cy="80" r="32" fill="#fff8c4"/>
  <circle cx="750" cy="80" r="32" fill="#ffd700" opacity="0.4"/>

  <!-- ============ NUVENS ============ -->
  <g opacity="0.95">
    <animateTransform attributeName="transform" type="translate" values="0 0; 40 0; 0 0" dur="20s" repeatCount="indefinite"/>
    <ellipse cx="180" cy="75" rx="50" ry="16" fill="url(#cloud)"/>
    <ellipse cx="215" cy="65" rx="32" ry="13" fill="url(#cloud)"/>
    <ellipse cx="148" cy="68" rx="28" ry="12" fill="url(#cloud)"/>
  </g>
  <g opacity="0.9">
    <animateTransform attributeName="transform" type="translate" values="0 0; -35 0; 0 0" dur="25s" repeatCount="indefinite"/>
    <ellipse cx="450" cy="45" rx="42" ry="14" fill="url(#cloud)"/>
    <ellipse cx="478" cy="38" rx="28" ry="11" fill="url(#cloud)"/>
  </g>
  <g opacity="0.85">
    <animateTransform attributeName="transform" type="translate" values="0 0; 30 0; 0 0" dur="22s" repeatCount="indefinite"/>
    <ellipse cx="80" cy="130" rx="38" ry="12" fill="url(#cloud)"/>
    <ellipse cx="105" cy="125" rx="24" ry="9" fill="url(#cloud)"/>
  </g>

  <!-- ============ GAIVOTAS ============ -->
  <g stroke="#2a2a2a" stroke-width="2.5" fill="none" stroke-linecap="round">
    <g>
      <animateTransform attributeName="transform" type="translate" values="-30 100; 930 80; -30 100" dur="35s" repeatCount="indefinite"/>
      <path d="M -10 0 Q -5 -7 0 0 Q 5 -7 10 0">
        <animate attributeName="d" values="M -10 0 Q -5 -7 0 0 Q 5 -7 10 0; M -10 0 Q -5 -2 0 0 Q 5 -2 10 0; M -10 0 Q -5 -7 0 0 Q 5 -7 10 0" dur="0.7s" repeatCount="indefinite"/>
      </path>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate" values="-30 140; 930 120; -30 140" dur="42s" begin="6s" repeatCount="indefinite"/>
      <path d="M -7 0 Q -3.5 -5 0 0 Q 3.5 -5 7 0">
        <animate attributeName="d" values="M -7 0 Q -3.5 -5 0 0 Q 3.5 -5 7 0; M -7 0 Q -3.5 -1 0 0 Q 3.5 -1 7 0; M -7 0 Q -3.5 -5 0 0 Q 3.5 -5 7 0" dur="0.8s" repeatCount="indefinite"/>
      </path>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate" values="930 160; -30 150; 930 160" dur="38s" begin="3s" repeatCount="indefinite"/>
      <path d="M -8 0 Q -4 -6 0 0 Q 4 -6 8 0">
        <animate attributeName="d" values="M -8 0 Q -4 -6 0 0 Q 4 -6 8 0; M -8 0 Q -4 -1.5 0 0 Q 4 -1.5 8 0; M -8 0 Q -4 -6 0 0 Q 4 -6 8 0" dur="0.75s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>

  <!-- ============ ÁGUA ============ -->
  <rect y="210" width="900" height="150" fill="url(#surfaceWater)"/>

  <!-- Reflexo do sol na água -->
  <ellipse cx="750" cy="220" rx="80" ry="6" fill="#fff4a3" opacity="0.5">
    <animate attributeName="rx" values="80;90;80" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="750" cy="235" rx="55" ry="3" fill="#fff4a3" opacity="0.35">
    <animate attributeName="rx" values="55;70;55" dur="3.5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="750" cy="250" rx="35" ry="2" fill="#fff4a3" opacity="0.25">
    <animate attributeName="rx" values="35;50;35" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Ondas animadas -->
  <path stroke="#ffffff" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round">
    <animate attributeName="d" 
             values="M 0 210 Q 75 205 150 210 T 300 210 T 450 210 T 600 210 T 750 210 T 900 210;
                     M 0 210 Q 75 215 150 210 T 300 210 T 450 210 T 600 210 T 750 210 T 900 210;
                     M 0 210 Q 75 205 150 210 T 300 210 T 450 210 T 600 210 T 750 210 T 900 210" 
             dur="3s" repeatCount="indefinite"/>
  </path>
  <path stroke="#ffffff" stroke-width="1.2" fill="none" opacity="0.35" stroke-linecap="round">
    <animate attributeName="d" 
             values="M 0 230 Q 120 226 240 230 T 480 230 T 720 230 T 900 230;
                     M 0 230 Q 120 234 240 230 T 480 230 T 720 230 T 900 230;
                     M 0 230 Q 120 226 240 230 T 480 230 T 720 230 T 900 230" 
             dur="4s" repeatCount="indefinite"/>
  </path>
  <path stroke="#ffffff" stroke-width="1" fill="none" opacity="0.25" stroke-linecap="round">
    <animate attributeName="d" 
             values="M 0 260 Q 100 257 200 260 T 400 260 T 600 260 T 800 260 T 900 260;
                     M 0 260 Q 100 263 200 260 T 400 260 T 600 260 T 800 260 T 900 260;
                     M 0 260 Q 100 257 200 260 T 400 260 T 600 260 T 800 260 T 900 260" 
             dur="5s" repeatCount="indefinite"/>
  </path>

  <!-- ============ BARCO À VELA ============ -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -4; 0 -1; 0 -5; 0 0" dur="4s" repeatCount="indefinite"/>

    <!-- Casco -->
    <path d="M 350 225 L 480 225 L 470 250 L 360 250 Z" fill="#5d3a1f" stroke="#2a1505" stroke-width="2"/>
    <line x1="355" y1="232" x2="475" y2="232" stroke="#2a1505" stroke-width="1.5"/>
    <!-- Detalhe inferior -->
    <path d="M 360 250 L 470 250 L 460 255 L 370 255 Z" fill="#3d2410"/>

    <!-- Mastro -->
    <line x1="415" y1="225" x2="415" y2="150" stroke="#3d2410" stroke-width="3"/>

    <!-- Vela grande (direita) -->
    <path d="M 416 154 L 416 220 L 465 220 Q 460 190 416 154 Z" fill="url(#sail)" stroke="#aaa" stroke-width="1"/>
    <!-- Vela menor (esquerda, jib) -->
    <path d="M 414 165 L 414 218 L 378 218 Q 384 192 414 165 Z" fill="url(#sail)" stroke="#aaa" stroke-width="1"/>

    <!-- Bandeira -->
    <path d="M 415 150 L 432 154 L 415 158 Z" fill="#e91e63">
      <animate attributeName="d" values="M 415 150 L 432 154 L 415 158 Z; M 415 150 L 432 152 L 415 158 Z; M 415 150 L 432 154 L 415 158 Z" dur="1.5s" repeatCount="indefinite"/>
    </path>

    <!-- Janelinha do casco -->
    <circle cx="395" cy="238" r="3" fill="#fff4a3" stroke="#2a1505" stroke-width="1"/>
    <circle cx="435" cy="238" r="3" fill="#fff4a3" stroke="#2a1505" stroke-width="1"/>
  </g>

  
  <!-- ============ TÍTULO ============ -->
  <text x="450" y="40" text-anchor="middle" font-family="Courier New, monospace" font-size="24" font-weight="bold" fill="#1a3a5e" opacity="0.95">
     Bem-Vindo a bordo Marujo!
  </text>
  <text x="450" y="62" text-anchor="middle" font-family="Courier New, monospace" font-size="13" fill="#2d4a6e" opacity="0.85">
    &lt; Role para baixo e explore o mar! /&gt;
  </text>

  <!-- Seta indicando "desça" -->
  <g opacity="0.7">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 6; 0 0" dur="2s" repeatCount="indefinite"/>
    <path d="M 440 335 L 450 345 L 460 335" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>